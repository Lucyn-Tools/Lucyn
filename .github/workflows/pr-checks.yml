name: 🔍 PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: 🏷️ Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🏷️ Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" must start with a capital letter.

  no-secrets-leaked:
    name: 🔐 Scan for Leaked Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  no-console-logs:
    name: 🚫 No console.log
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Check for console.log statements
        run: |
          changed_files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | \
            grep -E '\.(ts|tsx)$' | \
            grep -v -E '(test|spec|__tests__)' | \
            grep -v -E '(\.test\.|\.spec\.)' || true)

          if [ -z "$changed_files" ]; then
            echo "✅ No TypeScript files changed"
            exit 0
          fi

          found=false
          for file in $changed_files; do
            if grep -n "console\.log" "$file" 2>/dev/null; then
              echo "❌ Found console.log in $file"
              found=true
            fi
          done

          if [ "$found" = true ]; then
            echo "::error::Remove console.log statements before merging. Use a proper logger."
            exit 1
          fi
          echo "✅ No console.log statements found"

  no-env-files:
    name: 🔐 No .env Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Check for committed .env files
        run: |
          env_files=$(git diff --name-only origin/${{ github.base_ref }} HEAD | \
            grep -E '\.env' | \
            grep -v '\.env\.example' || true)

          if [ -n "$env_files" ]; then
            echo "::error::Do not commit .env files: $env_files"
            exit 1
          fi
          echo "✅ No .env files committed"

  pr-description:
    name: 📝 PR Has Description
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📝 Validate PR has description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.trim().length < 20) {
              core.setFailed('PR description is required and must be at least 20 characters. Explain what this PR does and why.');
            } else {
              console.log('✅ PR description is present');
            }
