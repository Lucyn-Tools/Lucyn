name: 🧹 Stale Issues & PRs

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    name: 🧹 Mark and Close Stale Items
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🧹 Handle stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: |
            👋 This issue has been inactive for 30 days.
            It will be closed in 7 days unless there is new activity.
            If this is still relevant, please leave a comment or remove the stale label.
          close-issue-message: |
            🔒 Closing this issue due to inactivity.
            Feel free to reopen if it becomes relevant again.
          stale-issue-label: 'stale'
          days-before-issue-stale: 30
          days-before-issue-close: 7

          # PRs
          stale-pr-message: |
            👋 This PR has been inactive for 14 days.
            It will be closed in 7 days unless there is new activity.
            Please rebase, resolve conflicts, or leave a comment if you're still working on it.
          close-pr-message: |
            🔒 Closing this PR due to inactivity.
            Feel free to reopen if you'd like to continue.
          stale-pr-label: 'stale'
          days-before-pr-stale: 14
          days-before-pr-close: 7

          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,bug,priority:high'
          exempt-pr-labels: 'pinned,security,priority:high'
          exempt-all-assignees: true
