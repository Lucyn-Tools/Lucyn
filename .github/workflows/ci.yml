name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter "@lucyn/db" run db:generate
        env:
          DATABASE_URL: postgresql://lucyn:lucyn@localhost:5432/lucyn

      - name: Typecheck — compression
        run: pnpm --filter "@lucyn/compression" run typecheck

      - name: Typecheck — github
        run: pnpm --filter "@lucyn/github" run typecheck

      - name: Typecheck — ai
        run: pnpm --filter "@lucyn/ai" run typecheck

      - name: Typecheck — discord-bot
        run: pnpm --filter "discord-bot" run typecheck

      - name: Typecheck — web app
        run: pnpm --filter "web" run typecheck

  build:
    name: Build web app
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      DATABASE_URL: postgresql://lucyn:lucyn@localhost:5432/lucyn
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      ANTHROPIC_API_KEY: placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter "@lucyn/db" run db:generate

      - name: Build web app
        run: pnpm --filter "web" run build
